# Copy this file to /etc/mosquitto/conf.d/ubuntu_mqtt_f103.conf inside Ubuntu/WSL.
# Default lab profile: prioritize bring-up and LAN accessibility over authentication.

listener 1883 0.0.0.0
allow_anonymous true

persistence false
connection_messages true
log_timestamp true

log_type error
log_type warning
log_type notice
log_type information
